<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitTrivia 🪐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d17;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 500px;
            min-height: 650px;
            background: #000000;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 1px solid #1a1a3e;
        }

        h1 {
            color: cyan;
            font-size: 32px;
            margin-bottom: 10px;
        }

        h2 {
            color: cyan;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .subtitle {
            color: gray;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .line {
            color: #333;
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 8px auto;
            padding: 12px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background: darkblue;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2d2d6e;
        }

        .btn-green {
            background: darkgreen;
        }

        .btn-green:hover {
            background: #006600;
        }

        .btn-orange {
            background: darkorange;
        }

        .btn-orange:hover {
            background: #cc7700;
        }

        .btn-red {
            background: darkred;
        }

        .btn-red:hover {
            background: #aa0000;
        }

        .btn-gray {
            background: gray;
        }

        .btn-gray:hover {
            background: #555;
        }

        .btn-small {
            font-size: 13px;
            padding: 8px;
            width: 220px;
        }

        .planet-btn {
            width: 220px;
            margin: 5px auto;
            padding: 10px;
        }

        .info-box {
            background: #111133;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }

        .info-box p {
            color: #cccccc;
            font-size: 13px;
            padding: 4px 0;
        }

        .fun-fact {
            color: gold;
            font-style: italic;
            margin: 15px 0;
            font-size: 14px;
        }

        .fact-item {
            color: #cccccc;
            font-size: 13px;
            text-align: left;
            padding: 5px 15px;
            font-family: Courier, monospace;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .top-bar .left {
            display: flex;
            gap: 10px;
        }

        .timer {
            font-size: 22px;
            font-weight: bold;
            color: lime;
            margin: 10px 0;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.4;
        }

        .result-score {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        .result-pct {
            font-size: 40px;
            font-weight: bold;
            color: gold;
            margin: 5px 0;
        }

        .player-name {
            color: cyan;
            font-size: 16px;
            margin: 5px 0;
        }

        .saved-msg {
            color: lime;
            font-size: 12px;
            margin: 5px 0;
        }

        .name-input {
            padding: 12px;
            font-size: 18px;
            width: 220px;
            background: #111133;
            color: white;
            border: none;
            border-radius: 8px;
            text-align: center;
            outline: none;
            margin: 15px 0;
        }

        .name-input::placeholder {
            color: #555;
        }

        .lb-header {
            display: flex;
            background: #111133;
            padding: 8px;
            border-radius: 5px;
            margin: 10px 0 5px 0;
        }

        .lb-header span {
            flex: 1;
            color: gold;
            font-weight: bold;
            font-size: 12px;
        }

        .lb-row {
            display: flex;
            padding: 6px 8px;
            border-radius: 3px;
        }

        .lb-row span {
            flex: 1;
            font-size: 12px;
        }

        .lb-row:nth-child(odd) {
            background: #0a0a2e;
        }

        .lb-score {
            color: lime;
        }

        .lb-diff {
            color: gray;
        }

        .footer {
            color: gray;
            font-size: 11px;
            margin-top: 20px;
        }

        .about-item {
            color: #cccccc;
            font-size: 13px;
            text-align: left;
            padding: 3px 15px;
        }

        .instructions {
            text-align: left;
            color: white;
            font-size: 13px;
            line-height: 1.8;
            padding: 10px 20px;
        }

        .diff-label {
            font-weight: bold;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        // ============== PLANET DATA ==============
        const planets = {
            "Mercury": {
                fact: "Mercury is the closest planet to the Sun. A year there lasts only 88 Earth days.",
                distance: "57.9 million km",
                size: "4,879 km diameter",
                moons: 0,
                day_length: "59 Earth days",
                year_length: "88 Earth days",
                fun_fact: "A year on Mercury is shorter than its day!"
            },
            "Venus": {
                fact: "Venus is the hottest planet in the solar system. Surface temperatures reach 475°C.",
                distance: "108.2 million km",
                size: "12,104 km diameter",
                moons: 0,
                day_length: "243 Earth days",
                year_length: "225 Earth days",
                fun_fact: "Venus spins backwards compared to most planets!"
            },
            "Earth": {
                fact: "Earth is the only known planet with life. About 71% of Earth's surface is water.",
                distance: "149.6 million km",
                size: "12,742 km diameter",
                moons: 1,
                day_length: "24 hours",
                year_length: "365.25 days",
                fun_fact: "Earth is the densest planet in the solar system!"
            },
            "Mars": {
                fact: "Mars is called the Red Planet. It has the largest volcano in the solar system.",
                distance: "227.9 million km",
                size: "6,779 km diameter",
                moons: 2,
                day_length: "24.6 hours",
                year_length: "687 Earth days",
                fun_fact: "Olympus Mons on Mars is 3x taller than Mount Everest!"
            },
            "Jupiter": {
                fact: "Jupiter is the largest planet in the solar system. It has a huge storm called the Great Red Spot.",
                distance: "778.5 million km",
                size: "139,820 km diameter",
                moons: 95,
                day_length: "10 hours",
                year_length: "12 Earth years",
                fun_fact: "Jupiter's Great Red Spot is a storm bigger than Earth!"
            },
            "Saturn": {
                fact: "Saturn is famous for its beautiful rings made of ice and rock.",
                distance: "1.43 billion km",
                size: "116,460 km diameter",
                moons: 146,
                day_length: "10.7 hours",
                year_length: "29 Earth years",
                fun_fact: "Saturn is so light it could float in water!"
            },
            "Uranus": {
                fact: "Uranus rotates on its side. It appears blue because of methane gas.",
                distance: "2.87 billion km",
                size: "50,724 km diameter",
                moons: 27,
                day_length: "17.2 hours",
                year_length: "84 Earth years",
                fun_fact: "Uranus was the first planet discovered with a telescope!"
            },
            "Neptune": {
                fact: "Neptune is the farthest planet from the Sun. It has the fastest winds in the solar system.",
                distance: "4.50 billion km",
                size: "49,244 km diameter",
                moons: 16,
                day_length: "16 hours",
                year_length: "165 Earth years",
                fun_fact: "Neptune was discovered using math before anyone saw it!"
            }
        };

        // ============== QUIZ QUESTIONS ==============
        const quizQuestions = {
            easy: [
                {question: "Which planet is closest to the Sun?", options: ["Venus", "Mercury", "Earth", "Mars"], answer: "Mercury"},
                {question: "Which planet is known as the Red Planet?", options: ["Jupiter", "Saturn", "Mars", "Venus"], answer: "Mars"},
                {question: "Which is the largest planet?", options: ["Saturn", "Jupiter", "Neptune", "Uranus"], answer: "Jupiter"},
                {question: "Which planet has beautiful rings?", options: ["Jupiter", "Uranus", "Neptune", "Saturn"], answer: "Saturn"},
                {question: "Which planet supports life?", options: ["Mars", "Earth", "Venus", "Mercury"], answer: "Earth"},
                {question: "How many planets are in our solar system?", options: ["7", "8", "9", "10"], answer: "8"},
                {question: "What is the Sun?", options: ["Planet", "Moon", "Star", "Asteroid"], answer: "Star"},
                {question: "Which planet is farthest from the Sun?", options: ["Uranus", "Saturn", "Neptune", "Pluto"], answer: "Neptune"},
                {question: "Which planet is the smallest?", options: ["Mars", "Mercury", "Venus", "Earth"], answer: "Mercury"},
                {question: "What does Earth mostly have on its surface?", options: ["Sand", "Ice", "Water", "Lava"], answer: "Water"},
                {question: "Which planet is nicknamed the Blue Planet?", options: ["Neptune", "Uranus", "Earth", "Venus"], answer: "Earth"},
                {question: "What shape is Earth?", options: ["Flat", "Cube", "Sphere", "Cylinder"], answer: "Sphere"},
            ],
            medium: [
                {question: "Which planet rotates on its side?", options: ["Neptune", "Uranus", "Saturn", "Jupiter"], answer: "Uranus"},
                {question: "Which planet is the hottest?", options: ["Mercury", "Venus", "Mars", "Jupiter"], answer: "Venus"},
                {question: "Which planet has the fastest winds?", options: ["Saturn", "Jupiter", "Uranus", "Neptune"], answer: "Neptune"},
                {question: "Which planet has the Great Red Spot?", options: ["Mars", "Saturn", "Jupiter", "Neptune"], answer: "Jupiter"},
                {question: "Which planet spins backwards?", options: ["Mars", "Venus", "Uranus", "Mercury"], answer: "Venus"},
                {question: "Which planet could float in water?", options: ["Jupiter", "Saturn", "Uranus", "Neptune"], answer: "Saturn"},
                {question: "Which planet has 95+ known moons?", options: ["Saturn", "Jupiter", "Uranus", "Neptune"], answer: "Jupiter"},
                {question: "How long is a day on Jupiter?", options: ["5 hours", "10 hours", "24 hours", "48 hours"], answer: "10 hours"},
                {question: "Which planet has the most moons?", options: ["Jupiter", "Saturn", "Uranus", "Neptune"], answer: "Saturn"},
                {question: "Which planet appears blue due to methane?", options: ["Neptune", "Earth", "Uranus", "Both Uranus and Neptune"], answer: "Both Uranus and Neptune"},
                {question: "Which planet has a day longer than its year?", options: ["Mercury", "Venus", "Mars", "Jupiter"], answer: "Venus"},
                {question: "What is the second largest planet?", options: ["Jupiter", "Neptune", "Saturn", "Uranus"], answer: "Saturn"},
            ],
            hard: [
                {question: "What is the tallest volcano in the solar system?", options: ["Mount Everest", "Olympus Mons", "Mauna Kea", "Mount Etna"], answer: "Olympus Mons"},
                {question: "How long is a year on Neptune?", options: ["84 years", "165 years", "29 years", "12 years"], answer: "165 years"},
                {question: "Which planet was discovered using math?", options: ["Uranus", "Pluto", "Neptune", "Saturn"], answer: "Neptune"},
                {question: "How many moons does Mars have?", options: ["0", "1", "2", "4"], answer: "2"},
                {question: "Which planet's day is longer than its year?", options: ["Mars", "Venus", "Mercury", "Jupiter"], answer: "Venus"},
                {question: "What are Saturn's rings made of?", options: ["Gas", "Fire", "Ice and rock", "Dust only"], answer: "Ice and rock"},
                {question: "What percentage of the solar system's mass is the Sun?", options: ["50%", "75%", "90%", "99.86%"], answer: "99.86%"},
                {question: "Which moon might have an ocean under its ice?", options: ["Titan", "Europa", "Ganymede", "Io"], answer: "Europa"},
                {question: "How many Earth days is a year on Mercury?", options: ["88", "165", "225", "365"], answer: "88"},
                {question: "Which planet was first discovered with a telescope?", options: ["Neptune", "Saturn", "Uranus", "Pluto"], answer: "Uranus"},
                {question: "What is the hottest planet's surface temperature?", options: ["275°C", "475°C", "175°C", "375°C"], answer: "475°C"},
                {question: "Which planet has the shortest day?", options: ["Earth", "Mars", "Jupiter", "Saturn"], answer: "Jupiter"},
            ]
        };

        // ============== GAME STATE ==============
        let score = 0;
        let currentQuestion = 0;
        let selectedQuestions = [];
        let difficulty = "easy";
        let playerName = "";
        let timerSeconds = 0;
        let timerId = null;
        let leaderboard = JSON.parse(localStorage.getItem('orbitTrivia_lb') || '[]');

        const app = document.getElementById('app');

        function saveLeaderboard() {
            localStorage.setItem('orbitTrivia_lb', JSON.stringify(leaderboard));
        }

        function addScore(name, sc, total, diff) {
            leaderboard.push({name, score: sc, total, difficulty: diff});
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            saveLeaderboard();
        }

        function shuffle(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function stopTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        // ============== MAIN MENU ==============
        function showMainMenu() {
            stopTimer();
            app.innerHTML = `
                <h1>🪐 OrbitTrivia</h1>
                <p class="subtitle">Explore planets & test your space knowledge!</p>
                <p class="line">━━━━━━━━━━━━━━━━━━━━━━━━━━━</p>
                <button class="btn" onclick="showPlanetList()">🌍  Explore Planets</button>
                <button class="btn" onclick="chooseDifficulty()">🧠  Start Quiz</button>
                <button class="btn" onclick="showLeaderboard()">🏅  Leaderboard</button>
                <button class="btn" onclick="showSolarFacts()">📊  Solar System Facts</button>
                <button class="btn" onclick="showHelp()">❓  How to Play</button>
                <button class="btn" onclick="showAbout()">ℹ️  About</button>
                <p class="footer">Made by Aaron 🚀 | Flavorthon</p>
            `;
        }

        // ============== HOW TO PLAY ==============
        function showHelp() {
            app.innerHTML = `
                <h2>❓ How to Play</h2>
                <div class="instructions">
                    <p>🌍 <b>EXPLORE PLANETS</b></p>
                    <p>Click on any planet to learn fun facts,</p>
                    <p>distance from Sun, size, moons, and more!</p>
                    <br>
                    <p>🧠 <b>QUIZ MODE</b></p>
                    <p>Choose Easy, Medium, or Hard difficulty.</p>
                    <p>Answer 5 random space questions.</p>
                    <p>You get 15 / 10 / 7 seconds per question!</p>
                    <br>
                    <p>🏆 <b>SCORING</b></p>
                    <p>Each correct answer = 1 point.</p>
                    <p>Try to get a perfect 5/5!</p>
                    <br>
                    <p>💡 <b>TIP</b></p>
                    <p>Explore planets FIRST to learn facts,</p>
                    <p>then take the quiz to test yourself!</p>
                </div>
                <button class="btn btn-gray" onclick="showMainMenu()">⬅  Back to Menu</button>
            `;
        }

        // ============== ABOUT ==============
        function showAbout() {
            const totalQ = quizQuestions.easy.length + quizQuestions.medium.length + quizQuestions.hard.length;
            const totalMoons = Object.values(planets).reduce((sum, p) => sum + p.moons, 0);
            app.innerHTML = `
                <h2>ℹ️ About OrbitTrivia</h2>
                <div class="info-box">
                    <p>🪐  OrbitTrivia v5.0</p>
                    <p></p>
                    <p>👨‍💻  Made by: Aaron Beavin</p>
                    <p>🏗️  Built for: Flavorthon by Hack Club</p>
                    <p>🐍  Language: Python 3 + Web (HTML/JS)</p>
                    <p>🖼️  GUI: Tkinter + Web Version</p>
                    <p></p>
                    <p>📊  Stats:</p>
                    <p>     ►  ${Object.keys(planets).length} planets</p>
                    <p>     ►  ${totalQ} quiz questions</p>
                    <p>     ►  3 difficulty levels</p>
                    <p>     ►  Leaderboard with top 10 scores</p>
                    <p></p>
                    <p>🚀  Thanks for playing!</p>
                </div>
                <button class="btn btn-gray" onclick="showMainMenu()">⬅  Back to Menu</button>
            `;
        }

        // ============== SOLAR SYSTEM FACTS ==============
        function showSolarFacts() {
            const totalMoons = Object.values(planets).reduce((sum, p) => sum + p.moons, 0);
            const facts = [
                "►  The Sun makes up 99.86% of the solar system's mass  ☀️",
                "►  Saturn has 146 known moons — the most!  🪐",
                "►  Earth is the densest planet in our solar system  🌍",
                "►  Mars has seasons like Earth due to its tilted axis  🔴",
                "►  Neptune's winds can reach 2,100 km/h  💨",
                "►  Venus is hotter than Mercury despite being farther  🌡️",
                "►  Olympus Mons on Mars is 3x taller than Everest  🏔️",
                "►  Europa (Jupiter's moon) may have a hidden ocean  🌊",
                `►  Total planets: ${Object.keys(planets).length}  🪐`,
                `►  Total known moons: ${totalMoons}  🌙`,
            ];
            app.innerHTML = `
                <h2>📊 Solar System Facts</h2>
                <div class="info-box">
                    ${facts.map(f => `<p class="fact-item">${f}</p>`).join('')}
                </div>
                <button class="btn btn-gray" onclick="showMainMenu()">⬅  Back to Menu</button>
            `;
        }

        // ============== PLANET EXPLORER ==============
        function showPlanetList() {
            let buttons = Object.keys(planets).map(p =>
                `<button class="btn planet-btn" onclick="showPlanetInfo('${p}')">🪐 ${p}</button>`
            ).join('');
            app.innerHTML = `
                <h2>🌌 Choose a Planet</h2>
                ${buttons}
                <button class="btn btn-gray btn-small" onclick="showMainMenu()" style="margin-top:15px">⬅  Back to Menu</button>
            `;
        }

        function showPlanetInfo(name) {
            const p = planets[name];
            app.innerHTML = `
                <h2 style="color:gold">🪐 ${name}</h2>
                <p style="margin:10px 0; line-height:1.5">${p.fact}</p>
                <div class="info-box">
                    <p>📏  Distance from Sun: ${p.distance}</p>
                    <p>📐  Size: ${p.size}</p>
                    <p>🌙  Moons: ${p.moons}</p>
                    <p>🌅  Day Length: ${p.day_length}</p>
                    <p>📅  Year Length: ${p.year_length}</p>
                </div>
                <p class="fun-fact">💡 ${p.fun_fact}</p>
                <button class="btn btn-gray btn-small" onclick="showPlanetList()">⬅  Back to Planets</button>
            `;
        }

        // ============== DIFFICULTY ==============
        function chooseDifficulty() {
            app.innerHTML = `
                <h2>🎯 Choose Difficulty</h2>
                <button class="btn btn-green" onclick="askName('easy')" style="margin-top:20px">🟢  Easy (15 sec/question)</button>
                <button class="btn btn-orange" onclick="askName('medium')">🟡  Medium (10 sec/question)</button>
                <button class="btn btn-red" onclick="askName('hard')">🔴  Hard (7 sec/question)</button>
                <p class="subtitle" style="margin-top:15px">Harder = harder questions + less time!</p>
                <button class="btn btn-gray btn-small" onclick="showMainMenu()" style="margin-top:10px">⬅  Back to Menu</button>
            `;
        }

        // ============== PLAYER NAME ==============
        function askName(diff) {
            difficulty = diff;
            app.innerHTML = `
                <h2 style="margin-top:40px">👨‍🚀 Enter Your Name</h2>
                <input type="text" class="name-input" id="nameInput" placeholder="Your name..." autofocus>
                <br>
                <button class="btn" onclick="beginQuiz()" style="margin-top:10px">🚀  Start Quiz!</button>
            `;
            document.getElementById('nameInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') beginQuiz();
            });
        }

        function beginQuiz() {
            let name = document.getElementById('nameInput').value.trim();
            if (!name) name = "Space Explorer";
            playerName = name;
            startQuiz();
        }

        // ============== QUIZ ==============
        function startQuiz() {
            score = 0;
            currentQuestion = 0;
            let questions = quizQuestions[difficulty] || quizQuestions.easy;
            selectedQuestions = shuffle(questions).slice(0, 5);
            showQuestion();
        }

        function getTimerSeconds() {
            if (difficulty === "easy") return 15;
            if (difficulty === "medium") return 10;
            return 7;
        }

        function showQuestion() {
            stopTimer();

            if (currentQuestion >= selectedQuestions.length) {
                showResult();
                return;
            }

            const q = selectedQuestions[currentQuestion];
            const diffColors = {easy: "lime", medium: "yellow", hard: "red"};
            timerSeconds = getTimerSeconds();

            let optionsHTML = q.options.map(opt =>
                `<button class="btn" onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', '${q.answer.replace(/'/g, "\\'")}')">${opt}</button>`
            ).join('');

            app.innerHTML = `
                <div class="top-bar">
                    <div class="left">
                        <span style="color:gray;font-weight:bold">Q${currentQuestion + 1}/${selectedQuestions.length}</span>
                        <span class="diff-label" style="color:${diffColors[difficulty]}">${difficulty.toUpperCase()}</span>
                    </div>
                    <div>
                        <span style="color:gold;font-weight:bold">Score: ${score}</span>
                        <span style="color:cyan;margin-left:10px">👨‍🚀 ${playerName}</span>
                    </div>
                </div>
                <p class="timer" id="timer">⏱️ ${timerSeconds}s</p>
                <p class="question-text">${q.question}</p>
                <div id="options">${optionsHTML}</div>
            `;

            startTimer(q.answer);
        }

        function startTimer(correctAnswer) {
            const timerEl = document.getElementById('timer');
            timerId = setInterval(() => {
                timerSeconds--;
                if (timerSeconds <= 0) {
                    stopTimer();
                    timerEl.textContent = "⏱️ TIME'S UP!";
                    timerEl.style.color = "red";
                    disableOptions();
                    alert(`⏱️ Time's Up! The correct answer was: ${correctAnswer}`);
                    currentQuestion++;
                    setTimeout(showQuestion, 300);
                } else {
                    timerEl.textContent = `⏱️ ${timerSeconds}s`;
                    if (timerSeconds <= 3) timerEl.style.color = "red";
                    else if (timerSeconds <= 5) timerEl.style.color = "orange";
                    else timerEl.style.color = "lime";
                }
            }, 1000);
        }

        function disableOptions() {
            const buttons = document.querySelectorAll('#options .btn');
            buttons.forEach(btn => btn.disabled = true);
        }

        function checkAnswer(selected, correct) {
            stopTimer();
            disableOptions();

            if (selected === correct) {
                score++;
                alert(`✅ Correct! '${selected}' is right! 🎉`);
            } else {
                alert(`❌ Wrong! The correct answer was '${correct}'`);
            }

            currentQuestion++;
            showQuestion();
        }

        // ============== RESULTS ==============
        function showResult() {
            stopTimer();
            addScore(playerName, score, selectedQuestions.length, difficulty);
            const pct = Math.round((score / selectedQuestions.length) * 100);

            let msg, color;
            if (score === selectedQuestions.length) { msg = "🌟 PERFECT! You're a Space Master!"; color = "lime"; }
            else if (score >= 4) { msg = "🚀 Amazing! You really know space!"; color = "cyan"; }
            else if (score >= 3) { msg = "⭐ Good job! Keep exploring!"; color = "gold"; }
            else if (score >= 2) { msg = "🌌 Not bad! Try exploring planets first!"; color = "orange"; }
            else { msg = "💫 Keep learning — the universe is huge!"; color = "red"; }

            app.innerHTML = `
                <h2 style="color:gold">🏆 Quiz Complete!</h2>
                <p class="player-name">👨‍🚀 ${playerName}</p>
                <p class="result-score">Score: ${score}/${selectedQuestions.length}</p>
                <p class="result-pct">${pct}%</p>
                <p style="color:${color};font-size:15px;margin:10px 0">${msg}</p>
                <p style="color:gray;font-size:12px">Difficulty: ${difficulty.toUpperCase()}</p>
                <p class="saved-msg">✅ Score saved to leaderboard!</p>
                <button class="btn" onclick="startQuiz()">🔄  Try Again</button>
                <button class="btn" onclick="showLeaderboard()">🏅  View Leaderboard</button>
                <button class="btn btn-gray" onclick="showMainMenu()">🏠  Back to Menu</button>
            `;
        }

        // ============== LEADERBOARD ==============
        function showLeaderboard() {
            const medals = ["🥇", "🥈", "🥉"];
            let rows = '';

            if (leaderboard.length === 0) {
                rows = '<p style="color:gray;margin:40px 0">No scores yet!<br>Play a quiz to get on the board!</p>';
            } else {
                rows = `
                    <div class="lb-header">
                        <span>Rank</span><span>Name</span><span>Score</span><span>Level</span>
                    </div>
                `;
                leaderboard.slice(0, 10).forEach((entry, i) => {
                    const rank = i < 3 ? medals[i] : `#${i + 1}`;
                    rows += `
                        <div class="lb-row">
                            <span>${rank}</span>
                            <span>${entry.name}</span>
                            <span class="lb-score">${entry.score}/${entry.total}</span>
                            <span class="lb-diff">${entry.difficulty.toUpperCase()}</span>
                        </div>
                    `;
                });
            }

            app.innerHTML = `
                <h2 style="color:gold">🏅 Leaderboard</h2>
                ${rows}
                <button class="btn btn-red btn-small" onclick="clearLeaderboard()" style="margin-top:15px">🗑️  Clear Leaderboard</button>
                <button class="btn btn-gray btn-small" onclick="showMainMenu()">⬅  Back to Menu</button>
            `;
        }

        function clearLeaderboard() {
            leaderboard = [];
            saveLeaderboard();
            alert("🗑️ Leaderboard has been cleared!");
            showLeaderboard();
        }

        // ============== START ==============
        showMainMenu();
    </script>
</body>
</html>
